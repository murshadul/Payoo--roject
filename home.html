<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>

    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <!-- Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-2">
                <div class="logo w-[60px]">
                    <img src="assets/logo.png" alt="">
                </div>
                <div class="">
                    <h2 class="font-bold text-neutral text-2xl">$ <span id="balance">45000</span>
                    </h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right ">
                <a class="btn btn-soft" href="/index.html"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>

        </section>
    </header>
    <section class="mx-auto w-11/12 space-y-5 py-10">
        <h2 class="font-bold text-neutral text-2xl ">Welcome to Pay<span class="text-primary">oo</span></span>
        </h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
        <div class="grid grid-cols-3 gap-3">
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-3.png" alt="">
                <p>Transfer Money</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </div>
    </section>
    <section class="cashout" class="w-11/12 mx-auto py-5">
        <h2 class="text-2xl font-bold text-neutral">Cashout</h2>
        <div class="form">
            <div class="card bg-base-100 w-full shadow mx-auto mt-10 rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label font-bold text-neutral-600 ">Agent Number</label>
                        <input id="agent-number" maxlength="11" minlength="11" type="text"
                            class="input bg-gray-200 rounded-full border-none w-full"
                            placeholder="Enter 11 digit number" />
                        <br>
                        <label class="label font-bold text-neutral-600 ">Amount</label>
                        <input id="cashout-amount" type="number" maxlength="50"
                            class="input bg-gray-200 rounded-full border-none w-full"
                            placeholder="Enter amount to withdraw" />
                        <br>

                        <label class="label font-bold text-neutral-600">Pin Number</label>
                        <input id="cashout-pin" type="password" maxlength="4"
                            class="input bg-gray-200 rounded-full border-none w-full"
                            placeholder="Enter 4 digit pin number" />

                        <button id="withdraw-btn"
                            class="btn btn-neutral mt-4 rounded-full border-none bg-primary  hover:bg-teal-200 ">Withdraw
                            Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>
    <script src="script/cashout.js"></script>
</body>

</html>
